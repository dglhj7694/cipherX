name: Early Session Scan (23:00 KST)

on:
  schedule:
    # US/Eastern 09:00 = UTC 13:00(EDT) / 14:00(EST)
    - cron: "0 13,14 * * 1-5"
  workflow_dispatch:

concurrency:
  group: early-session-scan
  cancel-in-progress: false

jobs:
  schedule_guard:
    name: schedule-guard
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      eastern_now: ${{ steps.guard.outputs.eastern_now }}
    steps:
      - name: Resolve US/Eastern window
        id: guard
        shell: bash
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("US/Eastern"))
          should_run = os.getenv("GITHUB_EVENT_NAME") != "schedule" or now.hour == 9

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if should_run else 'false'}\n")
              handle.write(f"eastern_now={now.isoformat()}\n")

          print(f"event={os.getenv('GITHUB_EVENT_NAME')} eastern_now={now.isoformat()} should_run={should_run}")
          PY

  early_session_shard:
    name: early-session-shard-${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    needs: schedule_guard
    if: ${{ needs.schedule_guard.outputs.should_run == 'true' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run early session scan (period=1y)
        run: |
          python -m scripts.daily_scan_and_notify \
            --scan-mode early_session \
            --out-dir artifacts/early_session/shard_${{ matrix.shard_index }} \
            --skip-telegram \
            --shard-count 8 \
            --shard-index ${{ matrix.shard_index }} \
            --run-stamp "$RUN_STAMP"

      - name: Upload early session shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: early-session-shard-${{ matrix.shard_index }}-${{ github.run_id }}
          path: artifacts/early_session/shard_${{ matrix.shard_index }}/*
          if-no-files-found: error

  early_session_merge_and_notify:
    name: early-session-merge-and-notify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - schedule_guard
      - early_session_shard
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download early session shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: early-session-shard-*-${{ github.run_id }}
          path: artifacts/early_session/merge_inputs
          merge-multiple: true

      - name: Merge and notify
        run: |
          python -m scripts.daily_scan_and_notify \
            --scan-mode early_session \
            --out-dir artifacts/early_session/final \
            --merge-dir artifacts/early_session/merge_inputs \
            --run-stamp "$RUN_STAMP"

      - name: Upload merged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: early-session-final-${{ github.run_id }}
          path: artifacts/early_session/final/*
          if-no-files-found: ignore
