name: Daily Scan Notify

on:
  schedule:
    - cron: "15 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-scan-notify
  cancel-in-progress: false

jobs:
  scan_and_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily scan and notify
        run: |
          python -m scripts.daily_scan_and_notify --out-dir artifacts/daily_scan

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-${{ github.run_id }}
          path: artifacts/daily_scan/*
          if-no-files-found: ignore
