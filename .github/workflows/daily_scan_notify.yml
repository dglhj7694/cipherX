name: Daily Scan Notify

on:
  schedule:
    # US/Eastern 16:05 = UTC 20:05(EDT) / 21:05(EST).
    # March/November overlap is resolved by schedule-guard during DST transitions.
    - cron: "5 20 * 3-11 1-5"
    - cron: "5 21 * 1-3,11-12 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan-notify
  cancel-in-progress: false

jobs:
  schedule_guard:
    name: schedule-guard
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      eastern_now: ${{ steps.guard.outputs.eastern_now }}
      event_schedule: ${{ steps.guard.outputs.event_schedule }}
    steps:
      - name: Resolve US/Eastern window
        id: guard
        shell: bash
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          import os

          event_name = os.getenv("GITHUB_EVENT_NAME")
          event_schedule = os.getenv("EVENT_SCHEDULE", "")
          now = datetime.now(ZoneInfo("US/Eastern"))
          is_dst = now.dst() != timedelta(0)
          expected_schedule = "5 20 * 3-11 1-5" if is_dst else "5 21 * 1-3,11-12 1-5"
          should_run = event_name != "schedule" or event_schedule == expected_schedule

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if should_run else 'false'}\n")
              handle.write(f"eastern_now={now.isoformat()}\n")
              handle.write(f"event_schedule={event_schedule}\n")

          print(
              "event="
              f"{event_name} event_schedule={event_schedule!r} "
              f"expected_schedule={expected_schedule!r} eastern_now={now.isoformat()} "
              f"should_run={should_run}"
          )
          PY

  market_briefing_notify:
    name: market-briefing-notify
    runs-on: ubuntu-latest
    needs: schedule_guard
    if: ${{ needs.schedule_guard.outputs.should_run == 'true' }}
    continue-on-error: true
    timeout-minutes: 60
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market briefing notify
        run: |
          python -m scripts.market_daily_briefing_notify \
            --out-dir artifacts/daily_scan/market_briefing

      - name: Upload market briefing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-briefing-${{ github.run_id }}
          path: artifacts/daily_scan/market_briefing/*
          if-no-files-found: ignore

  scan_shard:
    name: scan-shard-${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    needs:
      - schedule_guard
      - market_briefing_notify
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run shard scan
        run: |
          python -m scripts.daily_scan_and_notify \
            --out-dir artifacts/daily_scan/shard_${{ matrix.shard_index }} \
            --skip-telegram \
            --shard-count 8 \
            --shard-index ${{ matrix.shard_index }} \
            --run-stamp "$RUN_STAMP"

      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-shard-${{ matrix.shard_index }}-${{ github.run_id }}
          path: artifacts/daily_scan/shard_${{ matrix.shard_index }}/*
          if-no-files-found: error

  merge_and_notify:
    name: merge-default-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - schedule_guard
      - scan_shard
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daily-scan-shard-*-${{ github.run_id }}
          path: artifacts/daily_scan/merge_inputs
          merge-multiple: true

      - name: Merge default scan artifacts
        run: |
          python -m scripts.daily_scan_and_notify \
            --out-dir artifacts/daily_scan/final \
            --merge-dir artifacts/daily_scan/merge_inputs \
            --run-stamp "$RUN_STAMP" \
            --skip-telegram \
            --skip-digest-publish

      - name: Upload merged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-final-${{ github.run_id }}
          path: artifacts/daily_scan/final/*
          if-no-files-found: ignore

  extended_scan_shard:
    name: extended-scan-shard-${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    needs:
      - schedule_guard
      - market_briefing_notify
      - merge_and_notify
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run extended shard scan (Russell2000)
        run: |
          python -m scripts.daily_scan_and_notify \
            --out-dir artifacts/daily_scan_ext/shard_${{ matrix.shard_index }} \
            --skip-telegram \
            --shard-count 8 \
            --shard-index ${{ matrix.shard_index }} \
            --run-stamp "$RUN_STAMP" \
            --universe-profile russell2000

      - name: Upload extended shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-ext-shard-${{ matrix.shard_index }}-${{ github.run_id }}
          path: artifacts/daily_scan_ext/shard_${{ matrix.shard_index }}/*
          if-no-files-found: error

  extended_merge_and_notify:
    name: merge-russell2000-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - schedule_guard
      - extended_scan_shard
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download extended shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daily-scan-ext-shard-*-${{ github.run_id }}
          path: artifacts/daily_scan_ext/merge_inputs
          merge-multiple: true

      - name: Merge Russell2000 scan artifacts
        run: |
          python -m scripts.daily_scan_and_notify \
            --out-dir artifacts/daily_scan_ext/final \
            --merge-dir artifacts/daily_scan_ext/merge_inputs \
            --run-stamp "$RUN_STAMP" \
            --universe-profile russell2000 \
            --skip-telegram \
            --skip-digest-publish

      - name: Upload extended merged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-ext-final-${{ github.run_id }}
          path: artifacts/daily_scan_ext/final/*
          if-no-files-found: ignore

  combine_and_notify:
    name: combine-and-notify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - schedule_guard
      - merge_and_notify
      - extended_merge_and_notify
    if: ${{ always() && needs.schedule_guard.outputs.should_run == 'true' }}
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DIGEST_PUBLISH_TOKEN: ${{ secrets.DIGEST_PUBLISH_TOKEN || github.token }}
      DIGEST_PUBLISH_REPO: ${{ github.repository }}
      DIGEST_PUBLISH_BRANCH: telegram-digest
      DIGEST_PUBLISH_PATH: post_close
      PYTHONPATH: ${{ github.workspace }}
      RUN_STAMP: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download default final artifacts
        uses: actions/download-artifact@v4
        with:
          name: daily-scan-final-${{ github.run_id }}
          path: artifacts/daily_scan_combined/default

      - name: Download Russell2000 final artifacts
        uses: actions/download-artifact@v4
        with:
          name: daily-scan-ext-final-${{ github.run_id }}
          path: artifacts/daily_scan_combined/russell2000

      - name: Combine universes, publish digest, and notify
        run: |
          python -m scripts.daily_scan_and_notify \
            --out-dir artifacts/daily_scan_combined/final \
            --combine-final-dirs \
              artifacts/daily_scan_combined/default \
              artifacts/daily_scan_combined/russell2000 \
            --run-stamp "$RUN_STAMP"

      - name: Verify published latest digest
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          repo = os.environ["DIGEST_PUBLISH_REPO"]
          branch = os.environ["DIGEST_PUBLISH_BRANCH"]
          path = os.environ["DIGEST_PUBLISH_PATH"].strip("/\\") + "/latest.json"
          token = os.environ["DIGEST_PUBLISH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={branch}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "cipherX-daily-scan-digest-verify",
          }

          def load_digest(payload):
              encoded = str(payload.get("content") or "").strip()
              if encoded:
                  return json.loads(base64.b64decode(encoded).decode("utf-8"))
              blob_url = str(payload.get("git_url") or "").strip()
              if blob_url:
                  request = urllib.request.Request(blob_url, headers=headers)
                  with urllib.request.urlopen(request, timeout=20) as response:
                      blob = json.loads(response.read().decode("utf-8"))
                  blob_content = str(blob.get("content") or "").strip()
                  if blob_content:
                      return json.loads(base64.b64decode(blob_content).decode("utf-8"))
              download_url = str(payload.get("download_url") or "").strip()
              if download_url:
                  request = urllib.request.Request(download_url, headers=headers)
                  with urllib.request.urlopen(request, timeout=20) as response:
                      return json.loads(response.read().decode("utf-8"))
              raise RuntimeError("published digest content is empty")

          last_error = ""
          for attempt in range(1, 6):
              try:
                  request = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(request, timeout=20) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  digest = load_digest(payload)
                  if not isinstance(digest.get("sections"), list):
                      raise RuntimeError("published digest sections are missing")
                  if not dict(digest.get("briefing_refs") or {}).get("combined_universe"):
                      raise RuntimeError("published digest is not the combined universe digest")
                  print(f"verified {repo}/{branch}/{path}: sections={len(digest['sections'])}")
                  sys.exit(0)
              except Exception as exc:
                  last_error = str(exc)
                  if attempt < 5:
                      time.sleep(3)
          raise SystemExit(f"failed to verify published digest: {last_error}")
          PY

      - name: Upload combined artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-combined-final-${{ github.run_id }}
          path: artifacts/daily_scan_combined/final/*
          if-no-files-found: error
