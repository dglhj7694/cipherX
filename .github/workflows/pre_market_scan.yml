name: Pre-Market Scan (21:00 KST)

on:
  schedule:
    # KST 21:00 = UTC 12:00 (월~금)
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

concurrency:
  group: pre-market-scan
  cancel-in-progress: false

jobs:
  pre_market_shard:
    name: pre-market-shard-${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5]
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download latest post_close scan results
        uses: actions/download-artifact@v4
        with:
          pattern: daily-scan-final-*
          path: artifacts/daily_scan/prev_results
          merge-multiple: true
        continue-on-error: true

      - name: Run pre-market gap collection
        run: |
          python -m scripts.daily_scan_and_notify \
            --scan-mode pre_market \
            --prev-scan-dir artifacts/daily_scan/prev_results \
            --out-dir artifacts/pre_market/shard_${{ matrix.shard_index }} \
            --skip-telegram \
            --shard-count 6 \
            --shard-index ${{ matrix.shard_index }}

      - name: Upload pre-market shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-market-shard-${{ matrix.shard_index }}-${{ github.run_id }}
          path: artifacts/pre_market/shard_${{ matrix.shard_index }}/*
          if-no-files-found: error

  pre_market_merge_and_notify:
    name: pre-market-merge-and-notify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre_market_shard
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download pre-market shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pre-market-shard-*-${{ github.run_id }}
          path: artifacts/pre_market/merge_inputs
          merge-multiple: true

      - name: Merge and notify
        run: |
          python -m scripts.daily_scan_and_notify \
            --scan-mode pre_market \
            --out-dir artifacts/pre_market/final \
            --merge-dir artifacts/pre_market/merge_inputs

      - name: Upload merged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-market-final-${{ github.run_id }}
          path: artifacts/pre_market/final/*
          if-no-files-found: ignore
